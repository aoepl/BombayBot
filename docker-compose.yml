services:
  bombaybot:
    build: .
    image: ${DOCKER_IMAGE:-bombaybot:latest}
    restart: unless-stopped
    environment:
      DC_BOT_TOKEN: ${DC_BOT_TOKEN}
      DC_CLIENT_ID: ${DC_CLIENT_ID}
      DC_CLIENT_SECRET: ${DC_CLIENT_SECRET}
      DC_OWNER_ID: ${DC_OWNER_ID}
      DC_SLASH_SERVERS: ${DC_SLASH_SERVERS}
      DB_URI: ${DB_URI}
      LOG_LEVEL: ${LOG_LEVEL}
      STATUS: ${STATUS}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/healthy"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    volumes:
      - ./logs:/app/logs